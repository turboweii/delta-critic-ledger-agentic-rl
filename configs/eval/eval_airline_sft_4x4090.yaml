env:
  env_name: "airline"
  task_split: "test"
  num_tasks: 50
  num_samples_per_task: 4
  max_turns: 30
  user_model: "Qwen/Qwen2.5-7B-Instruct"
  user_provider: "openai"
  user_base_url: "http://localhost:8001/v1"

policy:
  model_name: "experiments/sft_lora_merged"
  served_model_name: "delta-assistant-7b-sft"
  base_url: "http://localhost:8000/v1"
  temperature: 0.7
  top_p: 0.9

output:
  dir: "outputs/eval_sft_airline"

