# 2 x NVIDIA A800 80GB: 72B SFT teacher, 32B GRPO user, 7B policy.

assistant:
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  model_path: "../models/Qwen2.5-7B-Instruct"
  served_name: "delta-assistant-7b"
  base_url: "http://localhost:8000/v1"
  port: 8000
  cuda_visible_devices: "0"
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.70
  max_model_len: 16384

user:
  model_name: "openai/Qwen/Qwen2.5-72B-Instruct-AWQ"
  model_path: "../models/Qwen2.5-72B-Instruct-AWQ"
  quantization: "awq"
  served_name: "Qwen/Qwen2.5-72B-Instruct-AWQ"
  base_url: "http://localhost:8001/v1"
  port: 8001
  cuda_visible_devices: "1"
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.70
  max_model_len: 12288
  max_num_seqs: 4

teacher:
  model_name: "openai/Qwen/Qwen2.5-72B-Instruct-AWQ"
  model_path: "../models/Qwen2.5-72B-Instruct-AWQ"
  quantization: "awq"
  served_name: "Qwen/Qwen2.5-72B-Instruct-AWQ"
  base_url: "http://localhost:8002/v1"
  port: 8002
  cuda_visible_devices: "0"
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.88
  max_model_len: 12288
  max_num_seqs: 2

training:
  cuda_visible_devices: "0,1"
  policy_gpus: "0"
  user_sim_gpus: "1"
  precision: "bf16"
  lora_rank: 16
  lora_alpha: 32
  gradient_checkpointing: true
