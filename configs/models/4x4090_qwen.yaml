# Model plan for 4 x RTX 4090 24GB.
#
# Rationale:
# - A 72B user simulator is unrealistic on 4x24GB without heavy quantization/offload.
# - Use Qwen2.5-7B-Instruct for both assistant and user simulator in the first
#   runnable version. This makes the project runnable locally on the target box.
# - If 8 GPUs are available, switch user.model_path to a 14B/32B AWQ model.

assistant:
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  model_path: "../models/Qwen2.5-7B-Instruct"
  served_name: "delta-assistant-7b"
  base_url: "http://localhost:8000/v1"
  port: 8000
  cuda_visible_devices: "0"
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.78
  max_model_len: 16384

user:
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  model_path: "../models/Qwen2.5-7B-Instruct"
  served_name: "delta-user-7b"
  base_url: "http://localhost:8001/v1"
  port: 8001
  cuda_visible_devices: "1"
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.78
  max_model_len: 16384

training:
  cuda_visible_devices: "0,1,2,3"
  policy_gpus: "0,1,2,3"
  precision: "bf16"
  lora_rank: 16
  lora_alpha: 32
  gradient_checkpointing: true

