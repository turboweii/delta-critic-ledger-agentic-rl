# Single-A800 80GB smoke profile. The 8x4090 profile remains the main run.
# This profile favors end-to-end validation over throughput or final quality.

defaults:
  - delta_ledger_grpo_4x4090
  - _self_

data:
  train_files: experiments/grpo_airline_a800_smoke/train.parquet
  val_files: experiments/grpo_airline_a800_smoke/val.parquet
  train_batch_size: 1
  max_prompt_length: 2048
  max_response_length: 1024

actor_rollout_ref:
  model:
    path: experiments/sft_lora_a800_smoke_merged
    enable_gradient_checkpointing: true
    lora_rank: 16
    lora_alpha: 32
  actor:
    ppo_mini_batch_size: 2
    ppo_micro_batch_size_per_gpu: 1
    fsdp_config:
      optimizer_offload: true
      param_offload: true
      model_dtype: bf16
  rollout:
    n: 2
    tensor_model_parallel_size: 1
    max_model_len: 4096
    max_num_batched_tokens: 2048
    max_num_seqs: 2
    gpu_memory_utilization: 0.30
    log_prob_micro_batch_size_per_gpu: 1
    multi_turn:
      max_user_turns: 6
      max_assistant_turns: 6
  ref:
    log_prob_micro_batch_size_per_gpu: 1
    fsdp_config:
      optimizer_offload: true
      param_offload: true
      model_dtype: bf16

trainer:
  n_gpus_per_node: 1
  nnodes: 1
  total_epochs: 2
  total_training_steps: 10
  save_freq: 10
  test_freq: 10
  experiment_name: delta_ledger_grpo_1xa800_80g_smoke
  default_local_dir: experiments/delta_ledger_grpo_1xa800_80g_smoke/checkpoints

