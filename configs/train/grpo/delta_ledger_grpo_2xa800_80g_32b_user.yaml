# Main GRPO config for 2 x A800 80GB with a 32B-AWQ user simulator.
# GPU0 trains/rolls out the 7B policy; GPU1 keeps the 32B-AWQ user simulator online.

hydra:
  searchpath:
    - pkg://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  train_files: experiments/grpo_airline/train.parquet
  val_files: experiments/grpo_airline/val.parquet
  train_batch_size: 2
  max_prompt_length: 10240
  max_response_length: 6144
  return_raw_chat: true
  tool_config_path: configs/tool_config/tau_bench_airline_tools.yaml

actor_rollout_ref:
  model:
    path: experiments/sft_lora_merged
    enable_gradient_checkpointing: true
    lora_rank: 16
    lora_alpha: 32
    use_fused_kernels: true
    fused_kernel_options:
      impl_backend: torch
    override_config:
      attn_implementation: flash_attention_2
  actor:
    fsdp_config:
      optimizer_offload: true
      param_offload: true
      model_dtype: bf16
    optim:
      lr: 5.0e-6
    use_kl_loss: true
    kl_loss_coef: 0.01
    kl_loss_type: low_var_kl
    use_fused_kernels: true
    ppo_mini_batch_size: 2
    ppo_micro_batch_size_per_gpu: 1
  rollout:
    name: vllm
    mode: async
    agent:
      default_agent_loop: tau_bench_tool_agent
      agent_loop_config_path: configs/agent_loop/tau_bench_agent_loop.yaml
    multi_turn:
      enable: true
      format: hermes
      max_user_turns: 12
      max_assistant_turns: 12
      tool_config_path: configs/tool_config/tau_bench_airline_tools.yaml
      interaction_config_path: configs/interaction_config/tau_bench_airline_delta_ledger.yaml
    n: 4
    temperature: 0.7
    top_p: 0.9
    tensor_model_parallel_size: 1
    calculate_log_probs: true
    gpu_memory_utilization: 0.32
    free_cache_engine: true
    max_num_seqs: 4
    max_model_len: 16384
    max_num_batched_tokens: 12288
    log_prob_micro_batch_size_per_gpu: 1
    val_kwargs:
      n: 1
      temperature: 0.7
      top_p: 0.9
  ref:
    fsdp_config:
      optimizer_offload: true
      param_offload: true
      model_dtype: bf16
    model:
      path: experiments/sft_lora_merged
      override_config:
        attn_implementation: flash_attention_2
    log_prob_micro_batch_size_per_gpu: 1

algorithm:
  adv_estimator: grpo
  kl_ctrl:
    kl_coef: 0.01
  rollout_correction:
    bypass_mode: true

custom_reward_function:
  path: src/delta_critic_ledger/verl_integration/reward.py
  name: compute_score

trainer:
  total_epochs: 30
  total_training_steps: 300
  save_freq: 50
  test_freq: 50
  default_local_dir: experiments/delta_ledger_grpo_2xa800/checkpoints
  logger: [console]
  project_name: delta-critic-ledger-agentic-rl
  experiment_name: delta_ledger_grpo_2xa800_80g_32b_user
  n_gpus_per_node: 1
  nnodes: 1
