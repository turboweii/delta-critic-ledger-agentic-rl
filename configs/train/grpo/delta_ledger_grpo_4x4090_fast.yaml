# Faster 4x4090 config after lowmem is verified stable.

defaults:
  - delta_ledger_grpo_4x4090
  - _self_

data:
  train_batch_size: 4
  max_prompt_length: 8192
  max_response_length: 8192

actor_rollout_ref:
  rollout:
    n: 4
    max_model_len: 16384
    max_num_batched_tokens: 16384
    max_num_seqs: 8
    gpu_memory_utilization: 0.48

trainer:
  total_training_steps: 300
  experiment_name: delta_ledger_grpo_4x4090_fast
  default_local_dir: experiments/delta_ledger_grpo_fast/checkpoints

