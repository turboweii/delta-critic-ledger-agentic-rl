# Low-memory fallback for 4 x RTX 4090.
# Use this first if the default GRPO config OOMs.

defaults:
  - delta_ledger_grpo_4x4090
  - _self_

data:
  train_batch_size: 2
  max_prompt_length: 4096
  max_response_length: 4096

actor_rollout_ref:
  actor:
    ppo_mini_batch_size: 2
    ppo_micro_batch_size_per_gpu: 1
  rollout:
    n: 2
    max_model_len: 8192
    max_num_batched_tokens: 8192
    max_num_seqs: 4
    gpu_memory_utilization: 0.38
    log_prob_micro_batch_size_per_gpu: 1
  ref:
    log_prob_micro_batch_size_per_gpu: 1

trainer:
  total_training_steps: 100
  experiment_name: delta_ledger_grpo_4x4090_lowmem
  default_local_dir: experiments/delta_ledger_grpo_lowmem/checkpoints

