# Conservative GRPO config for 8 x RTX 3090 with a 32B-AWQ user simulator.

defaults:
  - delta_ledger_grpo_8x4090_32b_user
  - _self_

data:
  train_batch_size: 6
  max_prompt_length: 10240
  max_response_length: 6144

actor_rollout_ref:
  actor:
    ppo_mini_batch_size: 6
    ppo_micro_batch_size_per_gpu: 1
  rollout:
    n: 4
    max_model_len: 16384
    max_num_batched_tokens: 12288
    max_num_seqs: 6
    gpu_memory_utilization: 0.38
    log_prob_micro_batch_size_per_gpu: 1
  ref:
    log_prob_micro_batch_size_per_gpu: 1

trainer:
  total_epochs: 30
  total_training_steps: 300
  save_freq: 50
  test_freq: 50
  experiment_name: delta_ledger_grpo_8x3090_32b_user
  default_local_dir: experiments/delta_ledger_grpo_8x3090/checkpoints
  n_gpus_per_node: 6
  nnodes: 1
