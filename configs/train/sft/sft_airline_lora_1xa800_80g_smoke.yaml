defaults:
  - sft_airline_lora_4x4090
  - _self_

data:
  train_jsonl: "experiments/sft_collect_airline_a800_smoke/train.jsonl"
  eval_jsonl: "experiments/sft_collect_airline_a800_smoke/eval.jsonl"
  max_length: 12288

train:
  num_epochs: 1
  per_device_batch_size: 1
  grad_accum_steps: 2
  logging_steps: 1
  save_strategy: "epoch"

output:
  dir: "experiments/sft_lora_a800_smoke"
  merged_dir: "experiments/sft_lora_a800_smoke_merged"
  manifest: "experiments/sft_lora_a800_smoke/checkpoint_manifest.json"
