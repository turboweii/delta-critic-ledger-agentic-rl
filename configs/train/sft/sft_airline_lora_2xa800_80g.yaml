model:
  name_or_path: ../models/Qwen2.5-7B-Instruct
  assistant_model_name: Qwen/Qwen2.5-7B-Instruct
  attn_impl: flash_attention_2

data:
  train_jsonl: experiments/sft_collect_airline/train.jsonl
  eval_jsonl: experiments/sft_collect_airline/eval.jsonl
  tool_config_path: configs/tool_config/tau_bench_airline_tools.yaml
  max_length: 16384

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

train:
  num_epochs: 3
  per_device_batch_size: 1
  grad_accum_steps: 16
  lr: 1.0e-4
  warmup_ratio: 0.05
  weight_decay: 0.0
  max_grad_norm: 1.0
  logging_steps: 5
  save_strategy: epoch
  seed: 42

output:
  dir: experiments/sft_lora_2xa800
  merged_dir: experiments/sft_lora_merged
  manifest: experiments/sft_lora_2xa800/checkpoint_manifest.json
