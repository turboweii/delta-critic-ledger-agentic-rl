defaults:
  - sft_airline_lora_4x4090
  - _self_

train:
  num_epochs: 3
  per_device_batch_size: 1
  grad_accum_steps: 8
  lr: 1.0e-4
  warmup_ratio: 0.05
  weight_decay: 0.0
  max_grad_norm: 1.0
  logging_steps: 5
  save_strategy: "epoch"
  seed: 42

data:
  max_length: 16384

output:
  dir: "experiments/sft_lora_8x3090"
  merged_dir: "experiments/sft_lora_merged"
  manifest: "experiments/sft_lora_8x3090/checkpoint_manifest.json"
